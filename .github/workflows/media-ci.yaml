name: media service ci

on:
  push:
    branches:
      - '**'          # Cấu hình Yêu cầu số 4: Quét tất cả các branch
      - '!main'       # Loại trừ đẩy trực tiếp vào main
    paths:
      - "media/**"
      - "common-library/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "media/**"
      - "common-library/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  # ==========================================
  # PHASE 1: TEST & QUALITY/SECURITY ANALYSIS
  # ==========================================
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
      statuses: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' || github.event_name == 'push' }}
      HAS_SONAR_TOKEN: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/workflows/actions

      - name: Install common-library dependency
        run: mvn -B -U clean install -pl common-library -am -DskipTests -Djacoco.skip=true -Drevision=1.0-SNAPSHOT

      # Chạy kiểm tra định dạng code (Checkstyle)
      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn -B checkstyle:checkstyle -f media/pom.xml -Dcheckstyle.output.file=media-checkstyle-result.xml -Drevision=1.0-SNAPSHOT

      - name: Upload Checkstyle Result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/media-checkstyle-result.xml'

      # CHẠY TESTCASE & XUẤT BÁO CÁO (Đáp ứng Yêu cầu số 5)
      # Chạy verify để test, tạo JaCoCo report và fail nếu coverage của media <= 70%.
      - name: Run Maven Verify, Tests and Generate JaCoCo Report
        run: |
          mvn -B -U clean verify -f media/pom.xml -Drevision=1.0-SNAPSHOT

      - name: Upload Test Results (Artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: media-test-results
          path: media/target/*-reports/TEST-*.xml
          if-no-files-found: warn

      - name: Test Results Reporter (Hiển thị giao diện PR)
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) && hashFiles('media/target/*-reports/TEST-*.xml') != '' }}
        with:
          name: Media-Service-Unit-Test-Results
          path: media/target/*-reports/TEST-*.xml
          reporter: java-junit

      # QUÉT BẢO MẬT & CHẤT LƯỢNG CODE (Đáp ứng Yêu cầu nâng cao 7c)
      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && env.HAS_SONAR_TOKEN == 'true' && github.repository_owner == 'nashtech-garage' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f media/pom.xml -Drevision=1.0-SNAPSHOT

      - name: OWASP Dependency Check
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: 'yas'
          path: '.'
          format: 'HTML'

      - name: Upload OWASP Dependency Check results
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: OWASP Dependency Check Report
          path: ${{github.workspace}}/reports

      # ĐỘ PHỦ TESTCASE JACOCO (Đáp ứng Yêu cầu số 5 & Nâng cao 7b)
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && hashFiles('media/target/site/jacoco/jacoco.xml') != '' }}
        with:
          paths: ${{github.workspace}}/media/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70            # Đã chỉnh về >70% theo Yêu cầu 7b
          min-coverage-changed-files: 60
          title: 'Media Coverage Report'
          update-comment: true

      - name: Upload Jacoco Coverage Report (Artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: media-jacoco-coverage
          path: media/target/site/jacoco/
          if-no-files-found: warn

  # ==========================================
  # PHASE 2: BUILD & DEPLOYMENT
  # ==========================================
  build:
    name: Build
    needs: test # Ép buộc Phase Test phải PASS hoàn toàn thì mới cho chạy Phase Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/workflows/actions

      # THỰC HIỆN BUILD (Bỏ qua chạy lại test để tiết kiệm thời gian)
      - name: Install common-library dependency
        run: mvn -B -U clean install -pl common-library -am -DskipTests -Djacoco.skip=true -Drevision=1.0-SNAPSHOT

      - name: Run Maven Build Command
        run: mvn -B -U clean package -f media/pom.xml -DskipTests -Djacoco.skip=true -Drevision=1.0-SNAPSHOT

      - name: Upload Build Artifact (.jar)
        uses: actions/upload-artifact@v4
        with:
          name: media-service-jar
          path: "media/target/*.jar"

      # ĐÓNG GÓI VÀ ĐẨY DOCKER IMAGE (Chỉ chạy khi code đã vào nhánh main)
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./media
          push: true
          tags: ghcr.io/${{ github.repository }}/yas-media:latest # Đã sửa để đẩy về đúng repo của bạn
